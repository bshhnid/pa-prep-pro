// ─── AI CALLS ─────────────────────────────────────────────────────────────────
const callAI = async(prompt, maxTokens=4000) => {
  const apiKey = CONFIG.ANTHROPIC_KEY;
  if(!apiKey||apiKey==="YOUR_ANTHROPIC_API_KEY_HERE") return null;
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  return data.content?.find(b=>b.type==="text")?.text||null;
};

// Generate lesson content
const generateLesson = async(topic, level, method) => {
  const levelCtx = LEVELS.find(l=>l.id===level);
  const prompts = {
    lesson: `You are an expert PA school educator. Create a focused lesson on "${topic}" for a ${levelCtx.label} level student (${levelCtx.desc}).

Structure:
1. OVERVIEW (2-3 sentences introducing the concept)
2. KEY CONCEPTS (4-6 bullet points of the most important things to know)
3. CLINICAL RELEVANCE (how this applies in practice)
4. MEMORY HOOK (a memorable way to remember this)
5. COMMON MISTAKES (what students get wrong)

Write at exactly the right level — not too basic, not too advanced. Be concise and clinically focused.
Return as plain text with clear section headers.`,

    guide: `You are an expert PA school educator. Create a comprehensive study guide on "${topic}" for a ${levelCtx.label} level student.

Include:
1. INTRODUCTION & BACKGROUND
2. CORE PATHOPHYSIOLOGY / MECHANISM
3. CLINICAL PRESENTATION
4. DIAGNOSIS & WORKUP
5. TREATMENT & MANAGEMENT
6. COMPLICATIONS
7. HIGH-YIELD BOARDS FACTS (if relevant)
8. QUICK REFERENCE TABLE (key facts in table format using plain text)

Calibrate depth to ${levelCtx.label} level. Be thorough but organized.
Return as plain text with clear headers.`,

    flashcard: `You are an expert PA school educator. Create 8-10 concept flashcards on "${topic}" for a ${levelCtx.label} level student.

Each flashcard: a key term or concept on the front, a concise explanation on the back.
Return ONLY valid JSON array:
[{"front": "term or concept", "back": "explanation 1-3 sentences"}]`,

    tutor: `You are an expert, friendly PA school tutor. A ${levelCtx.label} level student wants to learn about "${topic}".

Start by giving a warm welcome and a brief overview of what you'll cover together. Then explain the most fundamental concept first, as if speaking to them directly. End with "What aspect would you like to explore first?" or offer 3 specific follow-up options they can choose from.

Be conversational, encouraging, and appropriately detailed for their level. Use analogies where helpful.`
  };

  try {
    const text = await callAI(prompts[method]||prompts.lesson, method==="guide"?6000:3000);
    if(!text) return null;
    if(method==="flashcard"){
      const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
      return parsed;
    }
    return text;
  } catch(e) { return null; }
};

  const levelCtx = LEVELS.find(l=>l.id===level)||LEVELS[1];
  const recentQ = used.slice(-8).map(q=>q.question).join("; ");

  let typeInstr = "";
  if(questionType==="mc"||questionType==="mixed") typeInstr += `MC: {"type":"mc","subject":"subject","difficulty":"Easy|Medium|Hard","question":"text","options":["A","B","C","D"],"answer":0,"answerText":"correct text","explanation":"why correct","wrongExplanations":["why A","why B","why C","why D"]}`;
  if(questionType==="fitb"||questionType==="mixed") typeInstr += `\nFITB: {"type":"fitb","subject":"subject","difficulty":"Easy|Medium|Hard","question":"The ___ is...","answer":null,"answerText":"blanked term","blankedWord":"term","explanation":"explanation"}`;
  if(questionType==="free"||questionType==="mixed") typeInstr += `\nFREE: {"type":"free","subject":"subject","difficulty":"Easy|Medium|Hard","question":"Explain/Describe...","answer":null,"answerText":"","explanation":"model answer 3-5 sentences","keyPoints":["point1","point2","point3"]}`;

  const mixInstr = questionType==="mixed"?"Generate mix: ~50% MC, 25% FITB, 25% free response.":`Generate ONLY ${questionType} questions.`;
  const examInstr = examType==="pance"?"PANCE style — NCCPA blueprint, clinical vignettes.":examType==="boards"?"Maximum difficulty board-style vignettes.":examType==="paschool"?"PA school didactic year style.":"";
  const levelInstr = `LEVEL: ${levelCtx.label} (${levelCtx.desc}). Calibrate question complexity, vocabulary, and expected knowledge accordingly.`;

  const prompt = `You are an elite PA school educator and board exam writer.

Generate ${count} questions on: ${topic||subject||"all PA school subjects"}
${levelInstr}
Difficulty: ${difficulty&&difficulty!=="All"?difficulty:"mix Easy/Medium/Hard"}
${examInstr}
${mixInstr}
Never repeat: ${recentQ}

FORMAT — return ONLY valid JSON array:
[${typeInstr}]

wrongExplanations array: 4 entries, correct answer entry = "".`;

  try {
    const text = await callAI(prompt);
    if(!text) return [];
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    return parsed.map((q,i)=>({...q,id:Date.now()+i,ai:true}));
  } catch(e) { return []; }
};

// Grade free response
const gradeResponse = async(question, modelAnswer, keyPoints, userAnswer) => {
  const prompt = `You are a PA school professor grading a student's free response.
Question: ${question}
Model Answer: ${modelAnswer}
Key Points: ${keyPoints?keyPoints.join(", "):""}
Student Answer: ${userAnswer}

Return ONLY valid JSON:
{"score":85,"grade":"B","correct":true,"feedback":"2-3 sentence personalized feedback","missedPoints":["missed items"],"strengths":["strengths"]}
correct = true if score >= 70.`;
  try {
    const text = await callAI(prompt, 600);
    if(!text) return {score:null,feedback:"Add API key for AI grading.",correct:null};
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  } catch(e) { return {score:null,feedback:"Could not grade response.",correct:null}; }
};

// AI Tutor chat response
const tutorChat = async(topic, level, history, userMessage) => {
  const levelCtx = LEVELS.find(l=>l.id===level)||LEVELS[1];
  const historyText = history.map(h=>`${h.role==="user"?"Student":"Tutor"}: ${h.content}`).join("\n");
  const prompt = `You are an expert, friendly PA school tutor helping a ${levelCtx.label} level student learn about "${topic}".

Conversation so far:
${historyText}
Student: ${userMessage}

Respond as a knowledgeable, encouraging tutor. Be conversational. Explain concepts clearly at the ${levelCtx.label} level. Use clinical examples. Keep responses focused (3-5 sentences unless a detailed explanation is needed). End with a question or offer to explore a specific aspect if it helps the conversation.`;
  try {
    const text = await callAI(prompt, 1000);
    return text||"I couldn't generate a response. Please check your API key.";
  } catch(e) { return "Something went wrong. Please try again."; }
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  // Core
  const [screen,setScreen]             = React.useState("landing");
  const [tab,setTab]                   = React.useState("study");
  const [authMode,setAuthMode]         = React.useState("signup");
  const [form,setForm]                 = React.useState({name:"",email:"",password:""});
  const [formErr,setFormErr]           = React.useState("");
  const [user,setUser]                 = React.useState(()=>store.get("paprep_user"));
  const [loading,setLoading]           = React.useState(false);
  const [loadMsg,setLoadMsg]           = React.useState("");

  // User profile & progress
  const [userProfile,setUserProfile]   = React.useState(()=>store.get("paprep_profile")||null);
  const [prog,setProg]                 = React.useState(()=>store.get("paprep_prog")||{totalAnswered:0,totalCorrect:0,sessions:0,subjectStats:{},highScore:0,adaptiveLevel:{}});
  const [mastered,setMastered]         = React.useState(()=>store.get("paprep_mastered")||[]);
  const [learnBank,setLearnBank]       = React.useState(()=>store.get("paprep_learn")||[]);

  // Question bank
  const [bank,setBank]                 = React.useState([...SEED_QUESTIONS]);

  // Study session state
  const [studyMode,setStudyMode]       = React.useState(null);
  const [questionType,setQuestionType] = React.useState("mixed");
  const [examType,setExamType]         = React.useState(null);
  const [customTopic,setCustomTopic]   = React.useState("");
  const [deepDiveTopic,setDeepDiveTopic] = React.useState("");
  const [currentLevel,setCurrentLevel] = React.useState("didactic");
  const [activeModule,setActiveModule] = React.useState(null);
  const [subject,setSubject]           = React.useState("All");
  const [difficulty,setDiff]           = React.useState("All");

  // Quiz state
  const [queue,setQueue]               = React.useState([]);
  const [qIdx,setQIdx]                 = React.useState(0);
  const [picked,setPicked]             = React.useState(null);
  const [fitbAnswer,setFitbAnswer]     = React.useState("");
  const [fitbCorrect,setFitbCorrect]   = React.useState(null);
  const [freeText,setFreeText]         = React.useState("");
  const [aiGrade,setAiGrade]           = React.useState(null);
  const [gradingLoading,setGradingLoading] = React.useState(false);
  const [revealed,setRevealed]         = React.useState(false);
  const [score,setScore]               = React.useState(0);
  const [strikes,setStrikes]           = React.useState(0);
  const [answers,setAnswers]           = React.useState([]);
  const [streak,setStreak]             = React.useState(0);
  const [bestStreak,setBest]           = React.useState(0);
  const [sessionStats,setStats]        = React.useState({});
  const [animIn,setAnimIn]             = React.useState(true);
  const [shaking,setShaking]           = React.useState(false);
  const [timeLeft,setTimeLeft]         = React.useState(null);
  const [examStarted,setExamStarted]   = React.useState(false);

  // Flashcard state
  const [flashFlipped,setFlipped]      = React.useState(false);
  const [flashIdx,setFlashIdx]         = React.useState(0);

  // Lab state
  const [labIdx,setLabIdx]             = React.useState(0);
  const [labAnswered,setLabAnswered]   = React.useState(false);
  const [labInput,setLabInput]         = React.useState("");

  // Custom topic state
  const [customQ,setCustomQ]           = React.useState("");
  const [customCount,setCustomCount]   = React.useState(30);
  const [customTime,setCustomTime]     = React.useState(45);

  // Learn mode state
  const [learnMethod,setLearnMethod]   = React.useState(null);
  const [learnContent,setLearnContent] = React.useState(null);
  const [learnCards,setLearnCards]     = React.useState([]);
  const [learnCardIdx,setLearnCardIdx] = React.useState(0);
  const [learnCardFlipped,setLearnCardFlipped] = React.useState(false);
  const [learnPhase,setLearnPhase]     = React.useState("content");
  const [tutorHistory,setTutorHistory] = React.useState([]);
  const [tutorInput,setTutorInput]     = React.useState("");
  const [tutorLoading,setTutorLoading] = React.useState(false);
  const [bgFill,setBgFill]             = React.useState(false);

  // ── 4-TIER PRICING STATE ────────────────────────────────────────────────
  const [dailyUsed, setDailyUsed]      = React.useState(()=>getDailyUsed());

  const q = queue[qIdx];
  const tier = getUserTier(user);
  const tierCfg = CONFIG.TIERS[tier] || CONFIG.TIERS.free;
  const isPaid = tier !== "free";
  const isPro = isPaid; // legacy compat
  const unlimited = tierCfg.unlimited;
  const dailyLimit = tierCfg.dailyLimit;
  const hitFreeLimit = tier === "free" && prog.totalAnswered >= CONFIG.FREE_LIMIT;
  const hitDailyLimit = !unlimited && isPaid && dailyUsed >= dailyLimit;
  const hitLimit = hitFreeLimit || hitDailyLimit;
  const overallPct = prog.totalAnswered ? Math.round((prog.totalCorrect/prog.totalAnswered)*100):0;
  const pct = queue.length ? Math.round((score/queue.length)*100):0;

  // Adaptive level
  const getAdaptiveDifficulty = (topic) => {
    const perfKey = topic || subject;
    const perf = prog.adaptiveLevel?.[perfKey];
    if(!perf) return difficulty||"Medium";
    const pct = perf.correct/Math.max(perf.answered,1);
    if(pct>=0.85) return "Hard";
    if(pct>=0.65) return "Medium";
    return "Easy";
  };

  React.useEffect(()=>{store.set("paprep_prog",prog);},[prog]);
  React.useEffect(()=>{if(user)store.set("paprep_user",user);},[user]);
  React.useEffect(()=>{store.set("paprep_mastered",mastered);},[mastered]);
  React.useEffect(()=>{store.set("paprep_learn",learnBank);},[learnBank]);
  React.useEffect(()=>{if(userProfile)store.set("paprep_profile",userProfile);},[userProfile]);

  React.useEffect(()=>{
    if(screen!=="quiz"||studyMode!=="exam"||!examStarted||timeLeft===null)return;
    if(timeLeft<=0){endSession();return;}
    const t=setTimeout(()=>setTimeLeft(s=>s-1),1000);
    return()=>clearTimeout(t);
  },[screen,studyMode,examStarted,timeLeft]);

  React.useEffect(()=>{
    if(bank.length<80&&!bgFill&&CONFIG.ANTHROPIC_KEY!=="YOUR_ANTHROPIC_API_KEY_HERE"){
      setBgFill(true);
      Promise.all(SUBJECTS.slice(1).flatMap(s=>["mc","fitb"].map(t=>generateQuestions({subject:s,difficulty:"Medium",count:2,questionType:t,level:currentLevel,used:bank}))))
        .then(r=>{const nq=r.flat().map((q,i)=>({...q,id:Date.now()+i}));setBank(b=>[...b,...nq]);})
        .finally(()=>setBgFill(false));
    }
  },[bank.length,bgFill,currentLevel]);

  const handleAuth=()=>{
    if(!form.email||!form.password){setFormErr("Please fill in all fields.");return;}
    if(authMode==="signup"&&!form.name){setFormErr("Please enter your name.");return;}
    const u={name:form.name||form.email.split("@")[0],email:form.email,pro:false,tier:"free"};
    setUser(u);setFormErr("");
    if(!store.get("paprep_profile")){setScreen("onboarding");}
    else{setScreen("dashboard");}
  };
  const logout=()=>{store.set("paprep_user",null);setUser(null);setScreen("landing");};
  const activatePro=()=>{const u={...user,pro:true,tier:"pro"};setUser(u);store.set("paprep_user",u);};
  const activateTier=(t)=>{const u={...user,tier:t,pro:t!=="free"};setUser(u);store.set("paprep_user",u);};

  const saveProfile=(profile)=>{
    setUserProfile(profile);
    setCurrentLevel(profile.level);
    setScreen("dashboard");
  };

  const buildQueue=async(mode,eType,cTopic,ddTopic,count=15)=>{
    const adaptDiff = getAdaptiveDifficulty(ddTopic||cTopic||subject);
    let pool=[];
    if(mode==="learn-quiz") pool=bank.filter(q=>(subject==="All"||q.subject===subject)).sort(()=>Math.random()-0.5);
    else if(mode==="learnBank") pool=[...learnBank].sort(()=>Math.random()-0.5);
    else if(mode==="mastered") pool=[...mastered].sort(()=>Math.random()-0.5);
    else pool=bank.filter(q=>(subject==="All"||q.subject===subject)&&(difficulty==="All"||q.difficulty===difficulty)).sort(()=>Math.random()-0.5);

    let finalCount=count;
    if(mode==="exam"){if(eType==="pance")finalCount=60;else if(eType==="boards")finalCount=120;else if(eType==="paschool")finalCount=50;else finalCount=customCount;}
    if(mode==="strikes")finalCount=999;
    if(mode==="deepdive"||mode==="learn-quiz")finalCount=10;

    let selected=pool.slice(0,Math.min(finalCount,pool.length));
    const needsAI=CONFIG.ANTHROPIC_KEY!=="YOUR_ANTHROPIC_API_KEY_HERE";

    if((selected.length<Math.min(finalCount,10)||ddTopic||cTopic)&&needsAI){
      const needed=Math.min(finalCount,25)-selected.length+5;
      const ai=await generateQuestions({
        subject,difficulty:difficulty==="All"?adaptDiff:difficulty,
        count:Math.max(needed,8),questionType,
        topic:ddTopic||cTopic||"",level:currentLevel,examType:eType,used:bank
      });
      const withIds=ai.map((q,i)=>({...q,id:Date.now()+i}));
      setBank(b=>[...b,...withIds]);
      addDailyUsed(withIds.length); setDailyUsed(getDailyUsed());
      selected=[...selected,...withIds].slice(0,mode==="strikes"?999:finalCount);
    }
    return selected;
  };

  const startStudy=async(mode,eType="",cTopic="",ddTopic="")=>{
    if(hitLimit){setScreen("paywall");return;}
    setLoading(true);setLoadMsg("Loading questions…");
    try{
      const q=await buildQueue(mode,eType,cTopic,ddTopic);
      if(!q.length){setLoadMsg("No questions found. Try different filters.");setTimeout(()=>setScreen("dashboard"),2000);return;}
      setQueue(q);setQIdx(0);setPicked(null);setFitbAnswer("");setFitbCorrect(null);
      setFreeText("");setAiGrade(null);setRevealed(false);
      setScore(0);setStrikes(0);setAnswers([]);setStreak(0);setBest(0);setAnimIn(false);
      if(mode==="exam"){const mins=eType==="pance"?60:eType==="boards"?120:eType==="paschool"?75:customTime;setTimeLeft(mins*60);setExamStarted(true);}
      setStudyMode(mode);setExamType(eType);setDeepDiveTopic(ddTopic);
      setTimeout(()=>{setAnimIn(true);setScreen("quiz");},80);
    }catch(e){setLoadMsg("Error — try again.");setTimeout(()=>setScreen("dashboard"),2000);}
    finally{setLoading(false);setLoadMsg("");}
  };

  const startLearn=async(topic, method)=>{
    if(hitLimit){setScreen("paywall");return;}
    setLearnMethod(method);setLearnContent(null);setLearnCards([]);setLearnCardIdx(0);
    setLearnCardFlipped(false);setLearnPhase("content");setTutorHistory([]);
    setLoading(true);setLoadMsg(`Generating ${method==="tutor"?"AI tutor session":method==="guide"?"study guide":method==="flashcard"?"concept cards":"lesson"} on "${topic}"…`);
    try{
      if(method==="flashcard"){
        const cards=await generateLesson(topic,currentLevel,"flashcard");
        if(cards&&cards.length){setLearnCards(cards);setDeepDiveTopic(topic);setScreen("learn");}
        else{setLoadMsg("Could not generate cards. Check API key.");setTimeout(()=>setScreen("dashboard"),2500);}
      }else if(method==="tutor"){
        const intro=await generateLesson(topic,currentLevel,"tutor");
        setTutorHistory([{role:"assistant",content:intro||`Let's learn about ${topic}! What would you like to start with?`}]);
        setDeepDiveTopic(topic);setScreen("learn");
      }else{
        const content=await generateLesson(topic,currentLevel,method);
        if(content){setLearnContent(content);setDeepDiveTopic(topic);setScreen("learn");}
        else{setLoadMsg("Could not generate content. Check API key.");setTimeout(()=>setScreen("dashboard"),2500);}
      }
    }catch(e){setLoadMsg("Error generating content.");setTimeout(()=>setScreen("dashboard"),2500);}
    finally{setLoading(false);setLoadMsg("");}
  };

  const sendTutorMessage=async()=>{
    if(!tutorInput.trim()||tutorLoading)return;
    const msg=tutorInput.trim();setTutorInput("");
    const newHistory=[...tutorHistory,{role:"user",content:msg}];
    setTutorHistory(newHistory);setTutorLoading(true);
    try{
      const response=await tutorChat(deepDiveTopic,currentLevel,newHistory,msg);
      setTutorHistory(h=>[...h,{role:"assistant",content:response}]);
    }catch(e){setTutorHistory(h=>[...h,{role:"assistant",content:"Sorry, something went wrong. Please try again."}]);}
    finally{setTutorLoading(false);}
  };

  const handlePickMC=(idx)=>{
    if(picked!==null||!q)return;
    setPicked(idx);setRevealed(true);
    recordAnswer(idx===q.answer);
  };
  const handleFITB=(input)=>{
    if(revealed||!q)return;
    setFitbAnswer(input);setRevealed(true);
    const correct=q.answerText&&input.toLowerCase().trim().includes(q.answerText.toLowerCase().trim().split(" ")[0]);
    setFitbCorrect(correct);recordAnswer(correct);
  };
  const handleFreeSubmit=async(text)=>{
    if(revealed||!q)return;
    setFreeText(text);setGradingLoading(true);
    try{
      const grade=await gradeResponse(q.question,q.explanation,q.keyPoints,text);
      setAiGrade(grade);setRevealed(true);recordAnswer(grade.correct);
    }catch(e){setAiGrade({score:null,feedback:"Could not grade.",correct:null});setRevealed(true);recordAnswer(null);}
    finally{setGradingLoading(false);}
  };

  const recordAnswer=(ok)=>{
    if(ok===true){const ns=streak+1;setStreak(ns);if(ns>bestStreak)setBest(ns);setScore(s=>s+1);}
    else if(ok===false){setStreak(0);if(studyMode==="strikes"){const ns2=strikes+1;setStrikes(ns2);setShaking(true);setTimeout(()=>setShaking(false),500);if(ns2>=5)setTimeout(()=>endSession(),1500);}}
    setAnswers(a=>[...a,{ok,subject:q?.subject,question:q}]);
    if(q){
      if(ok){setMastered(m=>{const e=m.find(x=>x.id===q.id);return e?m:[...m,q];});setLearnBank(l=>l.filter(x=>x.id!==q.id));}
      else if(ok===false){setLearnBank(l=>{const e=l.find(x=>x.id===q.id);return e?l:[...l,q];});}
    }
    if(q){
      const key=deepDiveTopic||subject;
      setProg(p=>{
        const ss={...(p.subjectStats||{})};
        if(!ss[q.subject])ss[q.subject]={answered:0,correct:0};
        ss[q.subject].answered++;if(ok===true)ss[q.subject].correct++;
        const al={...(p.adaptiveLevel||{})};
        if(!al[key])al[key]={answered:0,correct:0};
        al[key].answered++;if(ok===true)al[key].correct++;
        return{...p,totalAnswered:p.totalAnswered+1,totalCorrect:p.totalCorrect+(ok===true?1:0),subjectStats:ss,adaptiveLevel:al};
      });
    }
    if(!isPro&&prog.totalAnswered+1>=CONFIG.FREE_LIMIT&&qIdx+1<queue.length)setTimeout(()=>setScreen("paywall"),1400);
  };

  const endSession=()=>{
    const st={};
    SUBJECTS.slice(1).forEach(s=>{const sub=answers.filter(a=>a.subject===s);if(sub.length)st[s]={correct:sub.filter(a=>a.ok===true).length,total:sub.length};});
    setStats(st);
    const fs=Math.round((score/Math.max(queue.length,1))*100);
    setProg(p=>({...p,sessions:p.sessions+1,highScore:Math.max(p.highScore||0,fs)}));
    setScreen("results");
  };

  const nextQ=()=>{
    if(studyMode==="strikes"&&strikes>=5){endSession();return;}
    if(qIdx+1>=queue.length){endSession();}
    else{setAnimIn(false);setTimeout(()=>{setQIdx(i=>i+1);setPicked(null);setFitbAnswer("");setFitbCorrect(null);setFreeText("");setAiGrade(null);setRevealed(false);setGradingLoading(false);setAnimIn(true);},200);}
  };
  const formatTime=(s)=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;

  const QTypeSelector=()=>(
    <div style={{marginBottom:18}}>
      <span style={S.lbl}>Question Type</span>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {Q_TYPES.map(t=>(
          <button key={t.id} onClick={()=>setQuestionType(t.id)} style={{padding:"10px 12px",borderRadius:12,cursor:"pointer",textAlign:"left",transition:"all 0.15s",
            border:questionType===t.id?`1px solid ${t.color}`:"1px solid rgba(255,255,255,0.07)",
            background:questionType===t.id?`${t.color}15`:"rgba(255,255,255,0.03)"}}>
            <div style={{fontSize:13,fontWeight:700,color:questionType===t.id?t.color:"#dde6ff",marginBottom:2}}>{t.icon} {t.label}</div>
            <div style={{fontSize:11,color:"#4a5a7a"}}>{t.desc}</div>
          </button>
        ))}
      </div>

        <div style={{marginBottom:16}}><span style={S.lbl}>Custom Exam</span><h2 style={{fontSize:"clamp(1.2rem,4vw,1.6rem)",fontWeight:700,color:"#dde6ff"}}>Build Your Exam</h2></div>

        <div style={{marginBottom:10}}><span style={S.lbl}>Subject</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{SUBJECTS.map(s=><FBtn key={s} label={s} active={subject===s} color={s==="All"?"#00C9A7":SC[s]} onClick={()=>setSubject(s)}/>)}</div></div>
        <div style={{marginBottom:18}}><span style={S.lbl}>Difficulty</span><div style={{display:"flex",gap:6}}>{["All",...DIFFS].map(d=><FBtn key={d} label={d} active={difficulty===d} color={d==="All"?"#a8c0ff":DC[d]} onClick={()=>setDiff(d)}/>)}</div></div>
        <button onClick={()=>startStudy("exam","custom")} style={S.primaryBtn()}>Start Exam →</button>
      </div>
    </div>
  );

  if(screen==="customSetup") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{padding:"22px 0 8px"}}><button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Back</button></div>
        <div style={{marginBottom:16}}>
          <span style={S.lbl}>Custom AI Topic</span>
          <h2 style={{fontSize:"clamp(1.2rem,4vw,1.6rem)",fontWeight:700,color:"#dde6ff"}}>What do you want to study?</h2>
        </div>
        <QTypeSelector/>
        <LevelSelector selected={currentLevel} onSelect={setCurrentLevel}/>
        <div style={{...S.card,marginBottom:14}}>
          <span style={S.lbl}>Your Topic</span>
          <textarea style={{...S.inp,height:90,resize:"vertical"}} placeholder="e.g. 'heart failure management', 'beta-lactam antibiotics'…" value={customQ} onChange={e=>setCustomQ(e.target.value)}/>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:18}}>
          {["Easy","Medium","Hard","Adaptive"].map(d=><FBtn key={d} label={d} active={difficulty===(d==="Adaptive"?"All":d)} color={d==="Adaptive"?"#a8c0ff":DC[d]||"#a8c0ff"} onClick={()=>setDiff(d==="Adaptive"?"All":d)}/>)}
        </div>
        <button onClick={()=>{if(customQ.trim())startStudy("custom","",customQ);}} style={{...S.primaryBtn(),opacity:customQ.trim()?1:0.5}}>Generate Questions →</button>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // LAB
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="lab") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 8px"}}>
          <button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Exit</button>
          <span style={{fontSize:13,color:"#4a5a7a",fontFamily:"monospace"}}>{labIdx+1}/{ANATOMY_ITEMS.length}</span>
        </div>
        <div style={{height:2,background:"rgba(255,255,255,0.05)",borderRadius:99,marginBottom:16}}><div style={{height:"100%",width:`${((labIdx+1)/ANATOMY_ITEMS.length)*100}%`,background:"linear-gradient(90deg,#FF9F43,#FF6F91)",borderRadius:99}}/></div>
        {(()=>{
          const item=ANATOMY_ITEMS[labIdx];
          return(
            <div>
              <div style={{display:"flex",gap:7,marginBottom:12}}><Pill color="#FF9F43">{item.category}</Pill><Pill color={item.level==="boards"?"#FF6F91":item.level==="paschool"?"#FFC75F":"#00C9A7"}>{item.level}</Pill></div>
              <h3 style={{fontSize:15,color:"#dde6ff",marginBottom:12,lineHeight:1.5}}>{item.question}</h3>
              <div style={{borderRadius:12,overflow:"hidden",marginBottom:12,border:"1px solid rgba(255,255,255,0.07)"}}><img src={item.image} alt={item.label} style={{width:"100%",display:"block"}} onError={e=>e.target.style.display="none"}/></div>
              {!labAnswered?(
                <div>
                  <input style={{...S.inp,marginBottom:10}} placeholder="Type your answer…" value={labInput} onChange={e=>setLabInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&setLabAnswered(true)}/>
                  <button onClick={()=>setLabAnswered(true)} style={S.primaryBtn()}>Reveal Answer →</button>
                </div>
              ):(
                <div style={{animation:"fadeUp 0.25s ease"}}>
                  <div style={{...S.card,borderColor:"rgba(0,201,167,0.2)",background:"rgba(0,201,167,0.05)",marginBottom:12}}>
                    <div style={{fontSize:10,letterSpacing:3,color:"#00C9A7",textTransform:"uppercase",marginBottom:6,fontFamily:"monospace"}}>✓ Answer</div>
                    <div style={{fontSize:16,fontWeight:700,color:"#00C9A7",marginBottom:6}}>{item.answer}</div>
                    <p style={{fontSize:13,color:"#7a8db0",lineHeight:1.7,margin:0}}>{item.explanation}</p>
                  </div>
                  <button onClick={()=>{if(labIdx+1>=ANATOMY_ITEMS.length)setScreen("dashboard");else{setLabIdx(i=>i+1);setLabAnswered(false);setLabInput("");}}} style={{...S.primaryBtn({background:"linear-gradient(135deg,#FF9F43,#e8890a)"})}}>
                    {labIdx+1>=ANATOMY_ITEMS.length?"Back to Dashboard":"Next Structure →"}
                  </button>
                </div>
              )}
            </div>

      </div>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>

  // ══════════════════════════════════════════════════════════════════════════
  // FLASHCARDS
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="quiz"&&studyMode==="flashcard") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 8px"}}>
          <button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Exit</button>
          <span style={{fontSize:13,color:"#4a5a7a",fontFamily:"monospace"}}>{flashIdx+1}/{queue.length}</span>
        </div>
        <div style={{height:2,background:"rgba(255,255,255,0.05)",borderRadius:99,marginBottom:18}}><div style={{height:"100%",width:`${((flashIdx+1)/queue.length)*100}%`,background:"linear-gradient(90deg,#845EC2,#00C9A7)",borderRadius:99}}/></div>
        {queue[flashIdx]&&(()=>{
          const fq=queue[flashIdx];
          return(
            <div>
              <div style={{display:"flex",gap:7,marginBottom:12}}><Pill color={SC[fq.subject]||"#00C9A7"}>{fq.subject}</Pill><Pill color={DC[fq.difficulty]}>{fq.difficulty}</Pill></div>
              <div onClick={()=>setFlipped(f=>!f)} style={{...S.card,minHeight:180,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",textAlign:"center",borderColor:flashFlipped?"rgba(0,201,167,0.3)":"rgba(255,255,255,0.07)",background:flashFlipped?"rgba(0,201,167,0.05)":"rgba(255,255,255,0.035)",transition:"all 0.3s",marginBottom:14,padding:24}}>
                {!flashFlipped?<div><div style={{fontSize:10,color:"#4a5a7a",fontFamily:"monospace",marginBottom:10,letterSpacing:3}}>TAP TO REVEAL</div><div style={{fontSize:14,lineHeight:1.7,color:"#dde6ff"}}>{fq.question}</div></div>
                :<div><div style={{fontSize:10,color:"#00C9A7",fontFamily:"monospace",marginBottom:8,letterSpacing:3}}>ANSWER</div><div style={{fontSize:16,fontWeight:700,color:"#00C9A7",marginBottom:8}}>{fq.answerText||(fq.options&&fq.options[fq.answer])}</div><div style={{fontSize:12,color:"#7a8db0",lineHeight:1.6}}>{fq.explanation}</div></div>}
              </div>
              {flashFlipped&&(
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>{setLearnBank(l=>{const e=l.find(x=>x.id===fq.id);return e?l:[...l,fq];});setFlipped(false);if(flashIdx+1>=queue.length)setScreen("dashboard");else setFlashIdx(i=>i+1);}} style={{flex:1,padding:"12px",borderRadius:11,border:"none",cursor:"pointer",background:"rgba(255,111,145,0.15)",color:"#FF6F91",fontSize:13,fontWeight:700}}>✗ Still Learning</button>
                  <button onClick={()=>{setMastered(m=>{const e=m.find(x=>x.id===fq.id);return e?m:[...m,fq];});setLearnBank(l=>l.filter(x=>x.id!==fq.id));setFlipped(false);if(flashIdx+1>=queue.length)setScreen("dashboard");else setFlashIdx(i=>i+1);}} style={{flex:1,padding:"12px",borderRadius:11,border:"none",cursor:"pointer",background:"rgba(0,201,167,0.15)",color:"#00C9A7",fontSize:13,fontWeight:700}}>✓ Got It</button>
                </div>
              )}
            </div>
          );
        })()}
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // QUIZ
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="quiz"&&q) return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 0 6px"}}>
          <button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Exit</button>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {studyMode==="strikes"&&<div style={{display:"flex",gap:2}}>{[0,1,2,3,4].map(i=><span key={i} style={{fontSize:12,opacity:i<strikes?1:0.2}}>{i<strikes?"💀":"❤️"}</span>)}</div>}
            {studyMode==="exam"&&timeLeft!==null&&<span style={{fontSize:13,color:timeLeft<300?"#FF6F91":"#FFC75F",fontFamily:"monospace",fontWeight:700}}>{formatTime(timeLeft)}</span>}
            {streak>=2&&<span style={{fontSize:11,color:"#FFC75F",fontFamily:"monospace"}}>🔥{streak}</span>}
            <span style={{fontSize:12,color:"#4a5a7a",fontFamily:"monospace"}}>{qIdx+1}{queue.length<500?"/"+queue.length:""}</span>
            <span style={{fontSize:11,color:"#00C9A7",fontFamily:"monospace"}}>{score}✓</span>
          </div>
        </div>

        {queue.length<500&&<div style={{height:2,background:"rgba(255,255,255,0.05)",borderRadius:99,marginBottom:16}}><div style={{height:"100%",width:`${(qIdx/queue.length)*100}%`,background:"linear-gradient(90deg,#00C9A7,#845EC2)",borderRadius:99,transition:"width 0.5s"}}/></div>}

                  let bg="rgba(255,255,255,0.03)",border="1px solid rgba(255,255,255,0.07)",color="#8a9dc0",icon="";
                  if(revealed){if(isCorr){bg="rgba(0,201,167,0.1)";border="1px solid rgba(0,201,167,0.5)";color="#00C9A7";icon="✓ ";}else if(isSel){bg="rgba(255,111,145,0.1)";border="1px solid rgba(255,111,145,0.5)";color="#FF6F91";icon="✗ ";}}
                  return <button key={idx} onClick={()=>handlePickMC(idx)} style={{background:bg,border,borderRadius:11,padding:"12px 14px",color,textAlign:"left",cursor:revealed?"default":"pointer",fontSize:13,lineHeight:1.5,transition:"all 0.18s"}}>
                    <span style={{fontFamily:"monospace",marginRight:7,opacity:0.35,fontSize:11}}>{String.fromCharCode(65+idx)}.</span>{icon}{opt}
                  </button>;
                })}
              </div>
            </div>
          )}

          {q.type==="fitb"&&<FITBRenderer q={q} revealed={revealed} fitbAnswer={fitbAnswer} onReveal={handleFITB}/>}

                style={{...S.inp,minHeight:130,resize:"vertical",marginBottom:8,lineHeight:1.6}}/>
              <div style={{fontSize:11,color:"#3a4a6a",marginBottom:10,textAlign:"right",fontFamily:"monospace"}}>{freeText.split(" ").filter(Boolean).length} words</div>
              <button onClick={()=>freeText.trim()&&!gradingLoading&&handleFreeSubmit(freeText)} disabled={!freeText.trim()||gradingLoading}
                style={S.primaryBtn({background:"linear-gradient(135deg,#FF6F91,#cc4466)",opacity:freeText.trim()&&!gradingLoading?1:0.5})}>
                {gradingLoading?"AI Grading…":"Submit for AI Grading →"}
              </button>
              {gradingLoading&&<div style={{textAlign:"center",marginTop:12}}><div style={{width:28,height:28,borderRadius:"50%",border:"3px solid rgba(255,111,145,0.15)",borderTopColor:"#FF6F91",animation:"spin 0.8s linear infinite",margin:"0 auto 6px"}}/><div style={{fontSize:11,color:"#4a5a7a",fontFamily:"monospace"}}>AI grading your response…</div></div>}
            </div>
          )}

          {revealed&&!gradingLoading&&(
            <div style={{marginTop:14,animation:"fadeUp 0.25s ease"}}>
              {q.type==="fitb"&&(
                <div style={{...S.card,marginBottom:10,borderColor:fitbCorrect?"rgba(0,201,167,0.3)":"rgba(255,111,145,0.3)",background:fitbCorrect?"rgba(0,201,167,0.05)":"rgba(255,111,145,0.05)"}}>
                  <div style={{fontSize:10,letterSpacing:3,color:fitbCorrect?"#00C9A7":"#FF6F91",textTransform:"uppercase",marginBottom:6,fontFamily:"monospace"}}>{fitbCorrect?"✓ Correct!":"✗ Incorrect"}</div>
                  <div style={{fontSize:13,marginBottom:4}}><span style={{color:"#6a7a9a",fontSize:11}}>Correct answer: </span><span style={{color:"#00C9A7",fontWeight:700}}>{q.answerText}</span></div>
                  {fitbAnswer&&!fitbCorrect&&<div style={{fontSize:11,color:"#6a7a9a"}}>Your answer: <span style={{color:"#FF6F91"}}>{fitbAnswer}</span></div>}
                </div>
              )}
              {q.type==="free"&&aiGrade&&(
                <div style={{...S.card,marginBottom:10,borderColor:aiGrade.correct===true?"rgba(0,201,167,0.3)":aiGrade.correct===false?"rgba(255,111,145,0.3)":"rgba(255,199,95,0.3)",background:aiGrade.correct===true?"rgba(0,201,167,0.05)":aiGrade.correct===false?"rgba(255,111,145,0.05)":"rgba(255,199,95,0.05)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <div style={{fontSize:10,letterSpacing:3,color:aiGrade.correct===true?"#00C9A7":"#FF6F91",textTransform:"uppercase",fontFamily:"monospace"}}>AI Grade</div>
                    {aiGrade.score!==null&&<div style={{fontSize:20,fontWeight:700,color:aiGrade.correct===true?"#00C9A7":"#FF6F91",fontFamily:"monospace"}}>{aiGrade.score}% {aiGrade.grade&&`· ${aiGrade.grade}`}</div>}
                  </div>
                  {aiGrade.feedback&&<p style={{fontSize:13,color:"#c0ccee",lineHeight:1.7,margin:"0 0 6px"}}>{aiGrade.feedback}</p>}
                  {aiGrade.strengths?.length>0&&<div style={{marginBottom:6}}><div style={{fontSize:10,color:"#00C9A7",fontFamily:"monospace",letterSpacing:2,marginBottom:4}}>STRENGTHS</div>{aiGrade.strengths.map((s,i)=><div key={i} style={{fontSize:11,color:"#5a7a5a",marginBottom:2}}>✓ {s}</div>)}</div>}
                  {aiGrade.missedPoints?.length>0&&<div><div style={{fontSize:10,color:"#FF6F91",fontFamily:"monospace",letterSpacing:2,marginBottom:4}}>MISSED</div>{aiGrade.missedPoints.map((s,i)=><div key={i} style={{fontSize:11,color:"#7a5a5a",marginBottom:2}}>• {s}</div>)}</div>}
                </div>
              )}
              <div style={{...S.card,marginBottom:10,borderColor:"rgba(168,192,255,0.1)"}}>
                <div style={{fontSize:10,letterSpacing:3,color:"#a8c0ff",textTransform:"uppercase",marginBottom:8,fontFamily:"monospace"}}>{q.type==="free"?"Model Answer":"Explanation"}</div>
                <p style={{color:"#c0ccee",fontSize:13,lineHeight:1.8,margin:0}}>{q.explanation}</p>
                {q.keyPoints?.length>0&&(
                  <div style={{marginTop:10,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:8}}>
                    <div style={{fontSize:10,color:"#4a5a7a",fontFamily:"monospace",letterSpacing:2,marginBottom:6}}>KEY POINTS</div>
                    {q.keyPoints.map((kp,i)=><div key={i} style={{display:"flex",gap:7,marginBottom:4}}><span style={{color:"#00C9A7",fontSize:11,flexShrink:0}}>•</span><span style={{fontSize:11,color:"#6a7a9a",lineHeight:1.6}}>{kp}</span></div>)}
                  </div>
                )}
                {(q.type==="mc"||!q.type)&&picked!==q.answer&&q.wrongExplanations?.[picked]&&(
                  <div style={{marginTop:8,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:8}}>
                    <div style={{fontSize:10,color:"#FF6F91",fontFamily:"monospace",letterSpacing:2,marginBottom:5}}>WHY YOUR ANSWER WAS WRONG</div>
                    <p style={{color:"#7a8db0",fontSize:12,lineHeight:1.7,margin:0}}>{q.wrongExplanations[picked]}</p>
                  </div>
                )}
              </div>
              {studyMode==="strikes"&&strikes>=5
                ?<button onClick={endSession} style={S.primaryBtn({background:"linear-gradient(135deg,#FF6F91,#cc4466)"})}>Game Over — See Results</button>
                :<button onClick={nextQ} style={S.primaryBtn({background:"linear-gradient(135deg,#845EC2,#6a44aa)",boxShadow:"0 4px 20px rgba(132,94,194,0.28)"})}>
                  {qIdx+1>=queue.length?"View Results →":"Next Question →"}
                </button>
              }
            </div>
          )}
        </div>
      </div>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // RESULTS — TIER-AWARE UPGRADE PROMPTS
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="results") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{textAlign:"center",padding:"36px 0 20px"}}>
          <div style={{fontSize:44,marginBottom:8}}>{pct>=80?"🏆":pct>=60?"📈":"📚"}</div>
          <span style={S.lbl}>Session Complete</span>
          <div style={{fontSize:"clamp(3rem,10vw,5rem)",fontWeight:700,lineHeight:1,
            background:pct>=80?"linear-gradient(135deg,#00C9A7,#00ffd5)":pct>=60?"linear-gradient(135deg,#FFC75F,#ffe0a0)":"linear-gradient(135deg,#FF6F91,#ffb0c0)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{pct}%</div>
          <div style={{color:"#4a5a7a",fontSize:13,marginTop:4}}>{score}/{Math.min(queue.length,qIdx+1)} correct</div>
          {deepDiveTopic&&<div style={{fontSize:11,color:"#845EC2",marginTop:3,fontFamily:"monospace"}}>{deepDiveTopic}</div>}
          {bestStreak>=3&&<div style={{color:"#FFC75F",fontSize:11,marginTop:3,fontFamily:"monospace"}}>🔥 Best streak: {bestStreak}</div>}
          <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:10}}>
            {[[mastered.length,"✅","Mastered"],[learnBank.length,"📖","Learn"],[`${prog.highScore||pct}%`,"🏆","Best"]].map(([n,icon,l])=>(
              <div key={l} style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:"#00C9A7",fontFamily:"monospace"}}>{icon} {n}</div><div style={{fontSize:10,color:"#4a5a7a"}}>{l}</div></div>
            ))}
          </div>
        </div>

        {Object.keys(sessionStats).length>0&&(
          <div style={{...S.card,marginBottom:12}}>
            <span style={S.lbl}>This Session</span>
            {Object.entries(sessionStats).map(([s,{correct,total}])=>(
              <div key={s} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <span style={{fontSize:11,color:"#6a7a9a"}}>{s}</span>
                  <span style={{fontSize:11,color:SC[s]||"#00C9A7",fontFamily:"monospace"}}>{correct}/{total}</span>
                </div>
                <PBar value={correct} max={total} color={SC[s]||"#00C9A7"}/>
              </div>
            ))}
          </div>
        )}

        {learnBank.length>0&&(
          <div style={{...S.card,marginBottom:12,borderColor:"rgba(255,111,145,0.2)"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#FF6F91",marginBottom:3}}>📖 {learnBank.length} in Learn folder</div>
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <button onClick={()=>startStudy("learnBank")} style={{flex:1,padding:"10px",borderRadius:9,border:"none",cursor:"pointer",background:"rgba(255,111,145,0.15)",color:"#FF6F91",fontSize:12,fontWeight:700}}>Practice Missed →</button>
              <button onClick={()=>{const topic=deepDiveTopic||subject||"the topics you missed";startLearn(topic,"tutor");}} style={{flex:1,padding:"10px",borderRadius:9,border:"none",cursor:"pointer",background:"rgba(132,94,194,0.15)",color:"#845EC2",fontSize:12,fontWeight:700}}>🤖 Learn with Tutor</button>
            </div>
          </div>
        )}

        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <button onClick={()=>startStudy(studyMode,examType,customTopic,deepDiveTopic)} style={S.primaryBtn({flex:1})}>Try Again</button>
          <button onClick={()=>setScreen("dashboard")} style={{...S.ghostBtn,flex:1}}>Dashboard</button>
        </div>

        {tier==="free"&&(
          <div style={{...S.card,borderColor:"rgba(0,201,167,0.15)",background:"rgba(0,201,167,0.04)",textAlign:"center",padding:16}}>
            <div style={{fontSize:13,color:"#00C9A7",marginBottom:3,fontWeight:700}}>💡 Unlock unlimited learning</div>
            <div style={{fontSize:11,color:"#4a5a7a",marginBottom:10}}>Basic $9.99 · Pro $19.99 · Annual $149.99 (Unlimited)</div>
            <button onClick={()=>setScreen("paywall")} style={{padding:"10px 22px",borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#00C9A7,#009d84)",color:"#fff",fontSize:13,fontWeight:700}}>Choose a Plan →</button>
          </div>
        )}
        {tier==="basic"&&(
          <div style={{...S.card,borderColor:"rgba(132,94,194,0.15)",background:"rgba(132,94,194,0.04)",textAlign:"center",padding:16}}>
            <div style={{fontSize:13,color:"#845EC2",marginBottom:3,fontWeight:700}}>💡 Upgrade to Pro — 200 q/day + AI Tutor</div>
            <div style={{fontSize:11,color:"#4a5a7a",marginBottom:10}}>$19.99/mo · or Annual unlimited at $149.99/yr</div>
            <button onClick={()=>setScreen("paywall")} style={{padding:"10px 22px",borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#845EC2,#6a44aa)",color:"#fff",fontSize:13,fontWeight:700}}>Upgrade →</button>
          </div>
        )}
        {tier==="pro"&&(
          <div style={{...S.card,borderColor:"rgba(255,199,95,0.15)",background:"rgba(255,199,95,0.04)",textAlign:"center",padding:16}}>
            <div style={{fontSize:13,color:"#FFC75F",marginBottom:3,fontWeight:700}}>✦ Go Annual for Unlimited — $12.50/mo</div>
            <div style={{fontSize:11,color:"#4a5a7a",marginBottom:10}}>$149.99/yr · Save $90 vs monthly Pro</div>
            <a href={CONFIG.STRIPE.annual} target="_blank" rel="noreferrer" onClick={()=>activateTier("annual")} style={{display:"inline-block",padding:"10px 22px",borderRadius:10,background:"linear-gradient(135deg,#FFC75F,#e6a800)",color:"#000",fontSize:13,fontWeight:700,textDecoration:"none"}}>Get Annual →</a>
          </div>
        )}
      </div>
      <style>{`*{box-sizing:border-box}`}</style>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
