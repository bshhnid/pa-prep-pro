  {id:8,subject:"Pharmacology",difficulty:"Medium",type:"free",question:"A patient with type 2 diabetes has an eGFR of 35 mL/min and is currently on metformin. What is your management and why?",answer:null,answerText:"",explanation:"Metformin is contraindicated when eGFR <30 mL/min/1.73m² due to risk of lactic acidosis from drug accumulation. At eGFR 30-45, metformin should be used with caution and dose reduced. At eGFR 35, most guidelines recommend stopping metformin or reducing to 50% dose with close monitoring. Alternative agents should be considered — SGLT-2 inhibitors have reduced efficacy at this eGFR, GLP-1 agonists or DPP-4 inhibitors (dose-adjusted) are preferred.",keyPoints:["Metformin contraindicated if eGFR <30","Use with caution eGFR 30-45","Risk: lactic acidosis from accumulation","Alternatives: GLP-1 agonists, DPP-4 inhibitors (dose-adjusted)"]},

  {id:11,subject:"Clinical Medicine",difficulty:"Hard",type:"free",question:"A 68-year-old male presents with 3 days of progressive dyspnea, orthopnea, and lower extremity edema. Exam shows JVD, S3 gallop, bibasilar crackles, and pitting edema to the knees. BNP is 1,200. What is your diagnosis, pathophysiology, and initial management?",answer:null,answerText:"",explanation:"This is acute decompensated heart failure (ADHF). The S3 gallop, JVD, bibasilar crackles, pitting edema, and elevated BNP confirm the diagnosis. Pathophysiology: reduced cardiac output → neurohormonal activation (RAAS, SNS) → sodium/water retention → increased preload → pulmonary congestion. Management: IV furosemide (diuresis), oxygen, position upright, monitor ins/outs, daily weights, echocardiography to assess EF, BMP for electrolytes/renal function. If HFrEF confirmed, initiate/optimize GDMT (ACEi/ARB, beta-blocker, spironolactone, SGLT-2i).",keyPoints:["Diagnosis: ADHF with likely HFrEF","BNP >500 highly specific for HF","First-line: IV furosemide + oxygen","Echo to assess EF","GDMT optimization once stabilized"]},

  {id:13,subject:"Pathophysiology",difficulty:"Hard",type:"fitb",question:"In hemorrhagic shock, the earliest compensatory mechanism is ___ activation, which triggers tachycardia and vasoconstriction within seconds.",answer:null,answerText:"baroreceptor/sympathetic",blankedWord:"baroreceptor/sympathetic",explanation:"Baroreceptors in the carotid sinus and aortic arch detect falling arterial pressure and immediately trigger sympathetic discharge. This is the fastest compensatory response — RAAS and ADH activation follow minutes later."},
  {id:14,subject:"Pathophysiology",difficulty:"Easy",type:"mc",question:"Left heart failure most commonly leads to?",options:["Pulmonary embolism","Pulmonary edema","Pneumothorax","Pleural empyema"],answer:1,answerText:"Pulmonary edema",explanation:"Left heart failure increases pulmonary venous pressure → fluid leaks into alveoli and interstitium → pulmonary edema.",wrongExplanations:["PE is from venous thromboembolism — not directly related to LHF.","","Pneumothorax is air in the pleural space — trauma or spontaneous rupture.","Pleural empyema is infected pleural fluid — complication of pneumonia."]},
  {id:15,subject:"Medical Ethics & Law",difficulty:"Easy",type:"mc",question:"Ethical principle requiring action in the patient's best interest?",options:["Autonomy","Beneficence","Non-maleficence","Justice"],answer:1,answerText:"Beneficence",explanation:"Beneficence obligates clinicians to act for the patient's benefit. Must be balanced with autonomy when patients make decisions that may not optimize health.",wrongExplanations:["Autonomy is the patient's right to make their own decisions.","","Non-maleficence is 'do no harm' — avoiding harm, not actively promoting benefit.","Justice is about fair distribution of healthcare resources."]},
  {id:16,subject:"Medical Ethics & Law",difficulty:"Medium",type:"fitb",question:"A competent adult who refuses life-saving treatment is exercising their right to ___, which providers must legally and ethically respect.",answer:null,answerText:"autonomy",blankedWord:"autonomy",explanation:"Patient autonomy is a foundational bioethical principle. Competent adults have the legal right to refuse any treatment, even life-saving interventions. Overriding this constitutes battery. The provider's role is to ensure the patient has decision-making capacity and is making an informed, voluntary decision."},
  {id:17,subject:"Medical Ethics & Law",difficulty:"Hard",type:"free",question:"Explain the four elements required to establish medical malpractice and give a clinical example of each.",answer:null,answerText:"",explanation:"The 4 Ds of medical malpractice: (1) Duty — a provider-patient relationship existed (e.g., a PA evaluated and treated the patient). (2) Dereliction — a breach of the standard of care (e.g., failing to order troponin in a patient with chest pain). (3) Direct causation — the breach directly caused harm (e.g., the missed MI led to cardiac arrest). (4) Damages — quantifiable harm resulted (e.g., permanent cardiac damage, lost wages). All four must be proven for a successful malpractice claim.",keyPoints:["Duty: provider-patient relationship","Dereliction: breach of standard of care","Direct causation: breach caused harm","Damages: quantifiable harm","All 4 elements must be proven"]},
  {id:18,subject:"Anatomy & Physiology",difficulty:"Easy",type:"fitb",question:"The ___ is the heart's natural pacemaker, spontaneously depolarizing at 60–100 beats per minute.",answer:null,answerText:"sinoatrial (SA) node",blankedWord:"sinoatrial (SA) node",explanation:"The SA node is located in the right atrium near the superior vena cava. It has the fastest intrinsic rate (60–100 bpm) so it dominates pacemaking. If it fails, the AV node takes over at 40–60 bpm."},

  {id:20,subject:"Clinical Medicine",difficulty:"Medium",type:"free",question:"Describe the SIRS criteria and explain how Sepsis-3 changed the definition of sepsis.",answer:null,answerText:"",explanation:"SIRS (Systemic Inflammatory Response Syndrome) requires ≥2 of: temp >38°C or <36°C, HR >90 bpm, RR >20 or PaCO2 <32 mmHg, WBC >12,000 or <4,000 or >10% bands. The original Sepsis-1 and Sepsis-2 definitions used SIRS + suspected infection. Sepsis-3 (2016) abandoned SIRS because it was too sensitive and non-specific — even simple infections met criteria. Sepsis-3 redefines sepsis as life-threatening organ dysfunction from a dysregulated host response to infection, identified by SOFA score increase ≥2. Septic shock = sepsis + vasopressors needed + lactate >2 mmol/L despite adequate fluids.",keyPoints:["SIRS: ≥2 of temp/HR/RR/WBC criteria","Sepsis-3: SOFA ≥2 + suspected infection","Abandoned SIRS — too sensitive/non-specific","Septic shock: vasopressors + lactate >2"]},

// ─── AI GENERATION ────────────────────────────────────────────────────────────
async function generateEliteQuestions({ subject, difficulty, count=10, mode="standard", questionType="mc", customTopic="", deepDiveTopic="", examType="", used=[] }) {
  const apiKey = CONFIG.ANTHROPIC_KEY;
  if (!apiKey || apiKey === "YOUR_ANTHROPIC_API_KEY_HERE") return [];

  const recentQ = used.slice(-10).map(q=>q.question).join("; ");
  const subjectCtx = deepDiveTopic ? `"${deepDiveTopic}"` : subject==="All" ? "across all PA school subjects" : subject;

  // Question type instructions
  let typeInstr = "";
  if (questionType === "mc" || questionType === "mixed") {
    typeInstr += `
MULTIPLE CHOICE format:
{
  "type": "mc",
  "question": "clinical question",
  "options": ["A","B","C","D"],
  "answer": 0,
  "answerText": "correct option text",
  "explanation": "why correct",
  "wrongExplanations": ["why A wrong","why B wrong","why C wrong","why D wrong"]
}`;
  }
  if (questionType === "fitb" || questionType === "mixed") {
    typeInstr += `
FILL IN THE BLANK format (use ___ for the blank):
{
  "type": "fitb",
  "question": "The ___ is responsible for X in context Y.",
  "answer": null,
  "answerText": "exact answer for the blank",
  "blankedWord": "the word/phrase that was blanked",
  "explanation": "clinical explanation"
}`;
  }
  if (questionType === "free" || questionType === "mixed") {
    typeInstr += `
FREE RESPONSE format (open-ended clinical questions):
{
  "type": "free",
  "question": "Explain/Describe/A patient presents with... what is your...",
  "answer": null,
  "answerText": "",
  "explanation": "comprehensive model answer 3-5 sentences",
  "keyPoints": ["key point 1", "key point 2", "key point 3", "key point 4"]
}`;
  }

  const mixedInstr = questionType === "mixed"
    ? "Generate a MIX: roughly 50% multiple choice, 25% fill in the blank, 25% free response. Vary the types throughout."
    : `Generate ONLY ${questionType === "mc" ? "multiple choice" : questionType === "fitb" ? "fill in the blank" : "free response"} questions.`;

  let modeInstr = "";
  if (mode==="exam" && examType==="pance") modeInstr = "PANCE STYLE: Match NCCPA blueprint. Clinical vignettes with demographics, vitals, labs. Focus on diagnosis, management, next best step.";
  else if (mode==="exam" && examType==="boards") modeInstr = "BOARD SIMULATION: Maximum difficulty. Test clinical reasoning. Include pharmacology pearls and management algorithms.";
  else if (mode==="exam" && examType==="paschool") modeInstr = "PA SCHOOL MIDTERM: Mix conceptual and clinical. Cover pathophysiology mechanisms, MOA, anatomy.";
  else if (mode==="strikes") modeInstr = "SURVIVAL MODE: Progressively harder. Tricky distractors testing deep understanding.";
  else if (deepDiveTopic) modeInstr = `DEEP DIVE: Generate highly specific questions about "${deepDiveTopic}". Cover pathophysiology, clinical presentation, diagnosis, treatment, complications.`;
  else if (customTopic) modeInstr = `CUSTOM TOPIC: "${customTopic}". Generate questions specifically about this topic at PA school level.`;

  const prompt = `You are an elite PA school educator and board exam question writer with 20 years of experience.

Generate ${count} high-quality, clinically accurate PA school questions.

Subject: ${subjectCtx}
Difficulty: ${difficulty&&difficulty!=="All"?difficulty:"mix of Easy (20%), Medium (50%), Hard (30%)"}
${modeInstr}

${mixedInstr}

QUESTION TYPE FORMATS:
${typeInstr}

QUALITY STANDARDS:
- Clinically realistic and board-accurate
- Clinical vignettes with patient details when appropriate
- Wrong answer choices must be plausible distractors
- Explanations must teach, not just confirm
- Free response questions should have comprehensive model answers with key points
- Fill in the blank should blank the most clinically important term
- Never repeat: ${recentQ}

Return ONLY a valid JSON array, no markdown, no preamble. Each object must have a "type" field ("mc", "fitb", or "free") and a "subject" field matching one of the PA school subjects.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==="text")?.text||"[]";
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    return parsed.map((q,i)=>({...q,id:Date.now()+i,ai:true}));
  } catch(e) { console.error("AI error:",e); return []; }
}

// ─── AI FREE RESPONSE GRADING ─────────────────────────────────────────────────
async function gradeResponse(question, modelAnswer, keyPoints, userAnswer) {
  const apiKey = CONFIG.ANTHROPIC_KEY;
  if (!apiKey || apiKey === "YOUR_ANTHROPIC_API_KEY_HERE") {
    return { score: null, feedback: "Add your Anthropic API key to enable AI grading.", correct: null };
  }
  const prompt = `You are a PA school professor grading a student's free response answer.

Question: ${question}

Model Answer: ${modelAnswer}

Key Points to cover: ${keyPoints ? keyPoints.join(", ") : ""}

Student's Answer: ${userAnswer}

Grade this response. Be fair but rigorous — this is PA school level.

Return ONLY valid JSON:
{
  "score": 85,
  "grade": "B",
  "correct": true,
  "feedback": "2-3 sentence personalized feedback on what they got right and what to improve",
  "missedPoints": ["any key points they missed"],
  "strengths": ["what they did well"]
}

Score 0-100. correct = true if score >= 70.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==="text")?.text||"{}";
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  } catch(e) { return { score:null, feedback:"Could not grade response.", correct:null }; }
}

function App() {

  const [answers,setAnswers]         = React.useState([]);

  const [bestStreak,setBest]         = React.useState(0);
  const [sessionStats,setStats]      = React.useState({});
  const [animIn,setAnimIn]           = React.useState(true);
  const [shaking,setShaking]         = React.useState(false);
  const [timeLeft,setTimeLeft]       = React.useState(null);
  const [examStarted,setExamStarted] = React.useState(false);
  const [flashFlipped,setFlipped]    = React.useState(false);
  const [flashIdx,setFlashIdx]       = React.useState(0);
  const [bgFill,setBgFill]           = React.useState(false);
  const [customQ,setCustomQ]         = React.useState("");
  const [customCount,setCustomCount] = React.useState(30);
  const [customTime,setCustomTime]   = React.useState(45);
  const [labIdx,setLabIdx]           = React.useState(0);
  const [labAnswered,setLabAnswered] = React.useState(false);
  const [labInput,setLabInput]       = React.useState("");

  const q = queue[qIdx];
  const isPro = user?.pro||false;
  const hitLimit = !isPro && prog.totalAnswered >= CONFIG.FREE_LIMIT;
  const overallPct = prog.totalAnswered ? Math.round((prog.totalCorrect/prog.totalAnswered)*100):0;
  const pct = queue.length ? Math.round((score/queue.length)*100):0;

  React.useEffect(()=>{store.set("paprep_prog",prog);},[prog]);
  React.useEffect(()=>{if(user)store.set("paprep_user",user);},[user]);
  React.useEffect(()=>{store.set("paprep_mastered",mastered);},[mastered]);
  React.useEffect(()=>{store.set("paprep_learn",learnBank);},[learnBank]);

  React.useEffect(()=>{
    if(screen!=="quiz"||studyMode!=="exam"||!examStarted||timeLeft===null)return;
    if(timeLeft<=0){endSession();return;}
    const t=setTimeout(()=>setTimeLeft(s=>s-1),1000);
    return()=>clearTimeout(t);
  },[screen,studyMode,examStarted,timeLeft]);

  React.useEffect(()=>{
    if(bank.length<80&&!bgFill&&CONFIG.ANTHROPIC_KEY!=="YOUR_ANTHROPIC_API_KEY_HERE"){
      setBgFill(true);
      Promise.all(SUBJECTS.slice(1).flatMap(s=>["mc","fitb","free"].map(t=>generateEliteQuestions({subject:s,difficulty:"Medium",count:2,questionType:t,used:bank}))))
        .then(r=>{const nq=r.flat().map((q,i)=>({...q,id:Date.now()+i}));setBank(b=>[...b,...nq]);})
        .finally(()=>setBgFill(false));
    }
  },[bank.length,bgFill]);

  const handleAuth=()=>{
    if(!form.email||!form.password){setFormErr("Please fill in all fields.");return;}
    if(authMode==="signup"&&!form.name){setFormErr("Please enter your name.");return;}
    const u={name:form.name||form.email.split("@")[0],email:form.email,pro:false};
    setUser(u);setFormErr("");setScreen("dashboard");
  };
  const logout=()=>{store.set("paprep_user",null);setUser(null);setScreen("landing");};
  const activatePro=()=>{const u={...user,pro:true};setUser(u);store.set("paprep_user",u);};

  // Filter bank by question type
  const filterByType = (pool, qType) => {
    if (qType === "mixed") return pool;
    return pool.filter(q => (q.type||"mc") === qType);
  };

  const buildQueue=async(mode,eType,cTopic,ddTopic,count=15)=>{
    let pool=[];
    if(mode==="learn") pool=[...learnBank].sort(()=>Math.random()-0.5);
    else if(mode==="mastered") pool=[...mastered].sort(()=>Math.random()-0.5);
    else{
      pool=bank.filter(q=>(subject==="All"||q.subject===subject)&&(difficulty==="All"||q.difficulty===difficulty));
      pool=filterByType(pool,questionType).sort(()=>Math.random()-0.5);
    }

    let finalCount=count;
    if(mode==="exam"){if(eType==="pance")finalCount=60;else if(eType==="boards")finalCount=120;else if(eType==="paschool")finalCount=50;else finalCount=customCount;}
    if(mode==="strikes")finalCount=999;
    if(mode==="deepdive")finalCount=15;

    let selected=pool.slice(0,Math.min(finalCount,pool.length));
    const needsAI=CONFIG.ANTHROPIC_KEY!=="YOUR_ANTHROPIC_API_KEY_HERE";

    if((selected.length<Math.min(finalCount,15)||ddTopic)&&needsAI){
      setLoadMsg(ddTopic?`Generating deep dive: "${ddTopic}"…`:"Generating questions…");
      const needed=Math.min(finalCount,30)-selected.length+5;
      const ai=await generateEliteQuestions({subject,difficulty,count:Math.max(needed,10),mode,questionType,examType:eType,customTopic:cTopic,deepDiveTopic:ddTopic,used:bank});
      const withIds=ai.map((q,i)=>({...q,id:Date.now()+i}));
      setBank(b=>[...b,...withIds]);
      selected=[...selected,...withIds].slice(0,mode==="strikes"?999:finalCount);
    }
    return selected;
  };

  const startStudy=async(mode,eType="",cTopic="",ddTopic="")=>{
    if(hitLimit){setScreen("paywall");return;}
    setLoading(true);setLoadMsg("Loading questions…");
    try{
      const q=await buildQueue(mode,eType,cTopic,ddTopic);
      if(!q.length){setLoadMsg("No questions found. Try different filters.");setTimeout(()=>setScreen("dashboard"),2000);return;}
      setQueue(q);setQIdx(0);setPicked(null);setFitbAnswer("");setFitbCorrect(null);
      setFreeText("");setAiGrade(null);setRevealed(false);
      setScore(0);setStrikes(0);setAnswers([]);setStreak(0);setBest(0);setAnimIn(false);
      if(mode==="exam"){const mins=eType==="pance"?60:eType==="boards"?120:eType==="paschool"?75:customTime;setTimeLeft(mins*60);setExamStarted(true);}
      setStudyMode(mode);setExamType(eType);setDeepDiveTopic(ddTopic);
      setTimeout(()=>{setAnimIn(true);setScreen("quiz");},80);
    }catch(e){setLoadMsg("Error — please try again.");setTimeout(()=>setScreen("dashboard"),2000);}
    finally{setLoading(false);setLoadMsg("");}
  };

  // Handle MC answer
  const handlePickMC=(idx)=>{
    if(picked!==null||!q)return;
    setPicked(idx);setRevealed(true);
    const ok=idx===q.answer;
    recordAnswer(ok);
  };

  // Handle FITB answer
  const handleFITB=(userInput)=>{
    if(revealed||!q)return;
    setFitbAnswer(userInput);setRevealed(true);
    const correct = q.answerText && userInput.toLowerCase().trim().includes(q.answerText.toLowerCase().trim().split(" ")[0]);
    setFitbCorrect(correct);
    recordAnswer(correct);
  };

  // Handle Free Response submit
  const handleFreeSubmit=async(text)=>{
    if(revealed||!q)return;
    setFreeText(text);setGradingLoading(true);
    try{
      const grade=await gradeResponse(q.question,q.explanation,q.keyPoints,text);
      setAiGrade(grade);setRevealed(true);
      recordAnswer(grade.correct);
    }catch(e){setAiGrade({score:null,feedback:"Could not grade — see model answer below.",correct:null});setRevealed(true);recordAnswer(null);}
    finally{setGradingLoading(false);}
  };

  const recordAnswer=(ok)=>{
    if(ok===true){const ns=streak+1;setStreak(ns);if(ns>bestStreak)setBest(ns);setScore(s=>s+1);}
    else if(ok===false){setStreak(0);if(studyMode==="strikes"){const ns2=strikes+1;setStrikes(ns2);setShaking(true);setTimeout(()=>setShaking(false),500);if(ns2>=5)setTimeout(()=>endSession(),1500);}}
    setAnswers(a=>[...a,{ok,subject:q.subject,question:q}]);
    if(q){
      if(ok){setMastered(m=>{const e=m.find(x=>x.id===q.id);return e?m:[...m,q];});setLearnBank(l=>l.filter(x=>x.id!==q.id));}
      else if(ok===false){setLearnBank(l=>{const e=l.find(x=>x.id===q.id);return e?l:[...l,q];});}
    }
    setProg(p=>{
      const ss={...(p.subjectStats||{})};
      if(!ss[q.subject])ss[q.subject]={answered:0,correct:0};
      ss[q.subject].answered++;if(ok===true)ss[q.subject].correct++;
      return{...p,totalAnswered:p.totalAnswered+1,totalCorrect:p.totalCorrect+(ok===true?1:0),subjectStats:ss};
    });
    if(!isPro&&prog.totalAnswered+1>=CONFIG.FREE_LIMIT&&qIdx+1<queue.length)setTimeout(()=>setScreen("paywall"),1400);
  };

  const endSession=()=>{
    const st={};
    SUBJECTS.slice(1).forEach(s=>{const sub=answers.filter(a=>a.subject===s);if(sub.length)st[s]={correct:sub.filter(a=>a.ok===true).length,total:sub.length};});
    setStats(st);
    const fs=Math.round((score/Math.max(queue.length,1))*100);
    setProg(p=>({...p,sessions:p.sessions+1,highScore:Math.max(p.highScore||0,fs)}));
    setScreen("results");
  };

  const nextQ=()=>{
    if(studyMode==="strikes"&&strikes>=5){endSession();return;}
    if(qIdx+1>=queue.length){endSession();}
    else{
      setAnimIn(false);
      setTimeout(()=>{setQIdx(i=>i+1);setPicked(null);setFitbAnswer("");setFitbCorrect(null);setFreeText("");setAiGrade(null);setRevealed(false);setGradingLoading(false);setAnimIn(true);},200);
    }
  };

  const formatTime=(s)=>`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;

  // Question type selector component
  const QTypeSelector = ()=>(
    <div style={{marginBottom:20}}>
      <span style={S.lbl}>Question Type</span>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {Q_TYPES.map(t=>(
          <button key={t.id} onClick={()=>setQuestionType(t.id)} style={{padding:"10px 12px",borderRadius:12,cursor:"pointer",textAlign:"left",transition:"all 0.15s",
            border:questionType===t.id?`1px solid ${t.color}`:"1px solid rgba(255,255,255,0.07)",
            background:questionType===t.id?`${t.color}15`:"rgba(255,255,255,0.03)"}}>
            <div style={{fontSize:14,marginBottom:3}}>{t.icon} <span style={{fontWeight:700,color:questionType===t.id?t.color:"#dde6ff",fontSize:13}}>{t.label}</span></div>
            <div style={{fontSize:11,color:"#4a5a7a"}}>{t.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // LANDING
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="landing") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <nav style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"22px 0"}}>
          <Logo/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setAuthMode("login");setScreen("auth");}} style={{padding:"8px 18px",borderRadius:20,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",color:"#8a9dc0",fontSize:13,cursor:"pointer"}}>Log in</button>

  if(screen==="customExamSetup") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{padding:"22px 0 8px"}}><button onClick={()=>setScreen("examSetup")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Back</button></div>
        <div style={{marginBottom:18}}><span style={S.lbl}>Custom Exam</span><h2 style={{fontSize:"clamp(1.3rem,4vw,1.7rem)",fontWeight:700,color:"#dde6ff"}}>Build Your Exam</h2></div>
        <QTypeSelector/>
        <div style={{...S.card,marginBottom:12}}><span style={S.lbl}>Number of Questions</span><input type="number" style={S.inp} value={customCount} onChange={e=>setCustomCount(parseInt(e.target.value)||30)} min="5" max="200"/></div>
        <div style={{...S.card,marginBottom:12}}><span style={S.lbl}>Time Limit (minutes)</span><input type="number" style={S.inp} value={customTime} onChange={e=>setCustomTime(parseInt(e.target.value)||45)} min="5" max="240"/></div>
        <div style={{marginBottom:12}}><span style={S.lbl}>Subject</span><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{SUBJECTS.map(s=><FBtn key={s} label={s} active={subject===s} color={s==="All"?"#00C9A7":SC[s]} onClick={()=>setSubject(s)}/>)}</div></div>
        <div style={{marginBottom:20}}><span style={S.lbl}>Difficulty</span><div style={{display:"flex",gap:6}}>{["All",...DIFFS].map(d=><FBtn key={d} label={d} active={difficulty===d} color={d==="All"?"#a8c0ff":DC[d]} onClick={()=>setDiff(d)}/>)}</div></div>
        <button onClick={()=>startStudy("exam","custom")} style={S.primaryBtn()}>Start Custom Exam →</button>
      </div>
    </div>
  );

  if(screen==="customSetup") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{padding:"22px 0 8px"}}><button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Back</button></div>
        <div style={{marginBottom:18}}>
          <span style={S.lbl}>Custom AI Topic</span>
          <h2 style={{fontSize:"clamp(1.3rem,4vw,1.7rem)",fontWeight:700,color:"#dde6ff"}}>What do you want to study?</h2>
          <p style={{color:"#4a5a7a",fontSize:13,marginTop:8,lineHeight:1.6}}>Type any topic. AI generates targeted questions in your chosen format.</p>
        </div>
        <QTypeSelector/>
        <div style={{...S.card,marginBottom:14}}>
          <span style={S.lbl}>Your Topic</span>
          <textarea style={{...S.inp,height:90,resize:"vertical"}} placeholder="e.g. 'heart failure management', 'beta-lactam antibiotics', 'COPD exacerbation'..." value={customQ} onChange={e=>setCustomQ(e.target.value)}/>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          {["Easy","Medium","Hard","Mixed"].map(d=><FBtn key={d} label={d} active={difficulty===(d==="Mixed"?"All":d)} color={d==="Mixed"?"#a8c0ff":DC[d]||"#a8c0ff"} onClick={()=>setDiff(d==="Mixed"?"All":d)}/>)}
        </div>
        <button onClick={()=>{if(customQ.trim())startStudy("custom","",customQ);}} style={{...S.primaryBtn(),opacity:customQ.trim()?1:0.5}}>Generate Questions →</button>
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // LAB
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="lab") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 8px"}}>
          <button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Exit</button>
          <span style={{fontSize:13,color:"#4a5a7a",fontFamily:"monospace"}}>{labIdx+1}/{ANATOMY_ITEMS.length}</span>
        </div>
        <div style={{height:2,background:"rgba(255,255,255,0.05)",borderRadius:99,marginBottom:18}}>
          <div style={{height:"100%",width:`${((labIdx+1)/ANATOMY_ITEMS.length)*100}%`,background:"linear-gradient(90deg,#FF9F43,#FF6F91)",borderRadius:99}}/>
        </div>
        {(()=>{
          const item=ANATOMY_ITEMS[labIdx];
          return(
            <div>
              <div style={{display:"flex",gap:7,marginBottom:12}}><Pill color="#FF9F43">{item.category}</Pill><Pill color={item.level==="boards"?"#FF6F91":item.level==="paschool"?"#FFC75F":"#00C9A7"}>{item.level}</Pill></div>
              <h3 style={{fontSize:15,color:"#dde6ff",marginBottom:14,lineHeight:1.5}}>{item.question}</h3>
              <div style={{borderRadius:12,overflow:"hidden",marginBottom:14,border:"1px solid rgba(255,255,255,0.07)"}}><img src={item.image} alt={item.label} style={{width:"100%",display:"block",background:"rgba(255,255,255,0.05)"}} onError={e=>e.target.style.display="none"}/></div>
              {!labAnswered?(
                <div>
                  <span style={S.lbl}>Your Answer</span>
                  <input style={{...S.inp,marginBottom:10}} placeholder="Type your answer..." value={labInput} onChange={e=>setLabInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&setLabAnswered(true)}/>
                  <button onClick={()=>setLabAnswered(true)} style={S.primaryBtn()}>Reveal Answer →</button>
                </div>
              ):(
                <div style={{animation:"fadeUp 0.25s ease"}}>
                  <div style={{...S.card,borderColor:"rgba(0,201,167,0.2)",background:"rgba(0,201,167,0.05)",marginBottom:12}}>
                    <div style={{fontSize:10,letterSpacing:3,color:"#00C9A7",textTransform:"uppercase",marginBottom:6,fontFamily:"monospace"}}>✓ Answer</div>
                    <div style={{fontSize:16,fontWeight:700,color:"#00C9A7",marginBottom:6}}>{item.answer}</div>
                    <p style={{fontSize:13,color:"#7a8db0",lineHeight:1.7,margin:0}}>{item.explanation}</p>
                  </div>
                  <button onClick={()=>{if(labIdx+1>=ANATOMY_ITEMS.length)setScreen("dashboard");else{setLabIdx(i=>i+1);setLabAnswered(false);setLabInput("");}}} style={{...S.primaryBtn({background:"linear-gradient(135deg,#FF9F43,#e8890a)"})}}>
                    {labIdx+1>=ANATOMY_ITEMS.length?"Back to Dashboard":"Next Structure →"}
                  </button>
                </div>
              )}
            </div>
          );
        })()}
      </div>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // FLASHCARDS
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="quiz"&&studyMode==="flashcard") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 0 8px"}}>
          <button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Exit</button>
          <span style={{fontSize:13,color:"#4a5a7a",fontFamily:"monospace"}}>{flashIdx+1}/{queue.length}</span>
        </div>
        <div style={{height:2,background:"rgba(255,255,255,0.05)",borderRadius:99,marginBottom:18}}>
          <div style={{height:"100%",width:`${((flashIdx+1)/queue.length)*100}%`,background:"linear-gradient(90deg,#845EC2,#00C9A7)",borderRadius:99}}/>
        </div>
        {queue[flashIdx]&&(()=>{
          const fq=queue[flashIdx];
          return(
            <div>
              <div style={{display:"flex",gap:7,marginBottom:12}}><Pill color={SC[fq.subject]||"#00C9A7"}>{fq.subject}</Pill><Pill color={DC[fq.difficulty]}>{fq.difficulty}</Pill></div>
              <div onClick={()=>setFlipped(f=>!f)} style={{...S.card,minHeight:180,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",textAlign:"center",borderColor:flashFlipped?"rgba(0,201,167,0.3)":"rgba(255,255,255,0.07)",background:flashFlipped?"rgba(0,201,167,0.05)":"rgba(255,255,255,0.035)",transition:"all 0.3s",marginBottom:14,padding:24}}>
                {!flashFlipped?(
                  <div><div style={{fontSize:10,color:"#4a5a7a",fontFamily:"monospace",marginBottom:10,letterSpacing:3}}>TAP TO REVEAL</div><div style={{fontSize:14,lineHeight:1.7,color:"#dde6ff"}}>{fq.question}</div></div>
                ):(
                  <div>
                    <div style={{fontSize:10,color:"#00C9A7",fontFamily:"monospace",marginBottom:8,letterSpacing:3}}>ANSWER</div>
                    <div style={{fontSize:17,fontWeight:700,color:"#00C9A7",marginBottom:8}}>{fq.answerText||(fq.options&&fq.options[fq.answer])}</div>
                    <div style={{fontSize:12,color:"#7a8db0",lineHeight:1.6}}>{fq.explanation}</div>
                  </div>
                )}
              </div>
              {flashFlipped&&(
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>{setLearnBank(l=>{const e=l.find(x=>x.id===fq.id);return e?l:[...l,fq];});setFlipped(false);if(flashIdx+1>=queue.length)setScreen("dashboard");else setFlashIdx(i=>i+1);}} style={{flex:1,padding:"12px",borderRadius:11,border:"none",cursor:"pointer",background:"rgba(255,111,145,0.15)",color:"#FF6F91",fontSize:13,fontWeight:700}}>✗ Still Learning</button>
                  <button onClick={()=>{setMastered(m=>{const e=m.find(x=>x.id===fq.id);return e?m:[...m,fq];});setLearnBank(l=>l.filter(x=>x.id!==fq.id));setFlipped(false);if(flashIdx+1>=queue.length)setScreen("dashboard");else setFlashIdx(i=>i+1);}} style={{flex:1,padding:"12px",borderRadius:11,border:"none",cursor:"pointer",background:"rgba(0,201,167,0.15)",color:"#00C9A7",fontSize:13,fontWeight:700}}>✓ Got It</button>
                </div>
              )}
            </div>
          );
        })()}
      </div>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // QUIZ — ALL QUESTION TYPES
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="quiz"&&q) return (
    <div style={S.page}>
      <div style={S.wrap}>
        {/* Header */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 0 6px"}}>
          <button onClick={()=>setScreen("dashboard")} style={{background:"none",border:"none",color:"#4a5a7a",cursor:"pointer",fontSize:13,padding:0}}>← Exit</button>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {studyMode==="strikes"&&<div style={{display:"flex",gap:2}}>{[0,1,2,3,4].map(i=><span key={i} style={{fontSize:13,opacity:i<strikes?1:0.2}}>{i<strikes?"💀":"❤️"}</span>)}</div>}
            {studyMode==="exam"&&timeLeft!==null&&<span style={{fontSize:13,color:timeLeft<300?"#FF6F91":"#FFC75F",fontFamily:"monospace",fontWeight:700}}>{formatTime(timeLeft)}</span>}
            {streak>=2&&<span style={{fontSize:12,color:"#FFC75F",fontFamily:"monospace"}}>🔥{streak}</span>}
            <span style={{fontSize:13,color:"#4a5a7a",fontFamily:"monospace"}}>{qIdx+1}{queue.length<500?"/"+queue.length:""}</span>
            <span style={{fontSize:12,color:"#00C9A7",fontFamily:"monospace"}}>{score}✓</span>
          </div>
        </div>

        {queue.length<500&&(
          <div style={{height:2,background:"rgba(255,255,255,0.05)",borderRadius:99,marginBottom:18}}>
            <div style={{height:"100%",width:`${(qIdx/queue.length)*100}%`,background:"linear-gradient(90deg,#00C9A7,#845EC2)",borderRadius:99,transition:"width 0.5s"}}/>
          </div>
        )}

        <div style={{opacity:animIn?1:0,transform:animIn?"translateY(0)":"translateY(14px)",transition:"all 0.28s ease",animation:shaking?"shake 0.3s ease":""}}>
          {/* Badges */}
          <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>
            <Pill color={SC[q.subject]||"#00C9A7"}>{q.subject}</Pill>
            <Pill color={DC[q.difficulty]}>{q.difficulty}</Pill>
            <QTypeBadge type={q.type||"mc"}/>
            {q.ai&&<Pill color="#a8c0ff">AI ✦</Pill>}
            {deepDiveTopic&&<Pill color="#845EC2">Deep Dive</Pill>}
          </div>

          {/* ── MULTIPLE CHOICE ── */}
          {(q.type==="mc"||!q.type)&&(
            <div>
              <div style={{fontSize:"clamp(0.95rem,3vw,1.1rem)",lineHeight:1.8,marginBottom:18,color:"#dde6ff"}}>{q.question}</div>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {q.options.map((opt,idx)=>{
                  const isSel=picked===idx,isCorr=idx===q.answer;
                  let bg="rgba(255,255,255,0.03)",border="1px solid rgba(255,255,255,0.07)",color="#8a9dc0",icon="";
                  if(revealed){if(isCorr){bg="rgba(0,201,167,0.1)";border="1px solid rgba(0,201,167,0.5)";color="#00C9A7";icon="✓ ";}else if(isSel){bg="rgba(255,111,145,0.1)";border="1px solid rgba(255,111,145,0.5)";color="#FF6F91";icon="✗ ";}}
                  return(
                    <button key={idx} onClick={()=>handlePickMC(idx)} style={{background:bg,border,borderRadius:11,padding:"13px 15px",color,textAlign:"left",cursor:revealed?"default":"pointer",fontSize:14,lineHeight:1.5,transition:"all 0.18s"}}>
                      <span style={{fontFamily:"monospace",marginRight:8,opacity:0.35,fontSize:11}}>{String.fromCharCode(65+idx)}.</span>{icon}{opt}
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── FILL IN THE BLANK ── */}
          {q.type==="fitb"&&(
            <FITBQuestion
              question={q.question}
              revealed={revealed}
              userAnswer={fitbAnswer}
              onReveal={handleFITB}
            />
          )}

          {/* ── FREE RESPONSE ── */}
          {q.type==="free"&&(
            <FreeResponseQuestion
              question={q.question}
              onSubmit={handleFreeSubmit}
              revealed={revealed}
              aiGrade={aiGrade}
              loading={gradingLoading}
            />
          )}

          {/* ── EXPLANATION (shown after answer) ── */}
          {revealed&&!gradingLoading&&(
            <div style={{marginTop:16,animation:"fadeUp 0.25s ease"}}>

              {/* AI Grade for free response */}
              {q.type==="free"&&aiGrade&&(
                <div style={{...S.card,marginBottom:12,
                  borderColor:aiGrade.correct===true?"rgba(0,201,167,0.3)":aiGrade.correct===false?"rgba(255,111,145,0.3)":"rgba(255,199,95,0.3)",
                  background:aiGrade.correct===true?"rgba(0,201,167,0.05)":aiGrade.correct===false?"rgba(255,111,145,0.05)":"rgba(255,199,95,0.05)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{fontSize:10,letterSpacing:3,color:aiGrade.correct===true?"#00C9A7":aiGrade.correct===false?"#FF6F91":"#FFC75F",textTransform:"uppercase",fontFamily:"monospace"}}>
                      AI Grade
                    </div>
                    {aiGrade.score!==null&&(
                      <div style={{fontSize:22,fontWeight:700,color:aiGrade.correct===true?"#00C9A7":aiGrade.correct===false?"#FF6F91":"#FFC75F",fontFamily:"monospace"}}>
                        {aiGrade.score}% {aiGrade.grade&&`· ${aiGrade.grade}`}
                      </div>
                    )}
                  </div>
                  {aiGrade.feedback&&<p style={{fontSize:13,color:"#c0ccee",lineHeight:1.7,margin:"0 0 8px"}}>{aiGrade.feedback}</p>}
                  {aiGrade.strengths&&aiGrade.strengths.length>0&&(
                    <div style={{marginBottom:8}}>
                      <div style={{fontSize:10,color:"#00C9A7",fontFamily:"monospace",letterSpacing:2,marginBottom:5}}>STRENGTHS</div>
                      {aiGrade.strengths.map((s,i)=><div key={i} style={{fontSize:12,color:"#5a7a5a",marginBottom:3}}>✓ {s}</div>)}
                    </div>
                  )}
                  {aiGrade.missedPoints&&aiGrade.missedPoints.length>0&&(
                    <div>
                      <div style={{fontSize:10,color:"#FF6F91",fontFamily:"monospace",letterSpacing:2,marginBottom:5}}>MISSED POINTS</div>
                      {aiGrade.missedPoints.map((s,i)=><div key={i} style={{fontSize:12,color:"#7a5a5a",marginBottom:3}}>• {s}</div>)}
                    </div>
                  )}
                </div>
              )}

              {/* FITB result */}
              {q.type==="fitb"&&(
                <div style={{...S.card,marginBottom:12,borderColor:fitbCorrect?"rgba(0,201,167,0.3)":"rgba(255,111,145,0.3)",background:fitbCorrect?"rgba(0,201,167,0.05)":"rgba(255,111,145,0.05)"}}>
                  <div style={{fontSize:10,letterSpacing:3,color:fitbCorrect?"#00C9A7":"#FF6F91",textTransform:"uppercase",marginBottom:8,fontFamily:"monospace"}}>
                    {fitbCorrect?"✓ Correct!":"✗ Incorrect"}
                  </div>
                  <div style={{fontSize:14,marginBottom:6}}>
                    <span style={{color:"#6a7a9a",fontSize:12}}>Correct answer: </span>
                    <span style={{color:"#00C9A7",fontWeight:700}}>{q.answerText}</span>
                  </div>
                  {fitbAnswer&&!fitbCorrect&&<div style={{fontSize:12,color:"#6a7a9a",marginBottom:8}}>Your answer: <span style={{color:"#FF6F91"}}>{fitbAnswer}</span></div>}
                </div>
              )}

              {/* Model answer / explanation */}
              <div style={{...S.card,borderColor:"rgba(168,192,255,0.1)",marginBottom:12}}>
                <div style={{fontSize:10,letterSpacing:3,color:"#a8c0ff",textTransform:"uppercase",marginBottom:8,fontFamily:"monospace"}}>
                  {q.type==="free"?"Model Answer":"Explanation"}
                </div>
                <p style={{color:"#c0ccee",fontSize:14,lineHeight:1.8,margin:0}}>{q.explanation}</p>
                {q.keyPoints&&q.keyPoints.length>0&&(
                  <div style={{marginTop:12,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:10}}>
                    <div style={{fontSize:10,color:"#4a5a7a",fontFamily:"monospace",letterSpacing:2,marginBottom:8}}>KEY POINTS</div>
                    {q.keyPoints.map((kp,i)=>(
                      <div key={i} style={{display:"flex",gap:8,marginBottom:5}}>
                        <span style={{color:"#00C9A7",fontSize:12,flexShrink:0}}>•</span>
                        <span style={{fontSize:12,color:"#6a7a9a",lineHeight:1.6}}>{kp}</span>
                      </div>
                    ))}
                  </div>
                )}
                {/* MC wrong explanations */}
                {(q.type==="mc"||!q.type)&&picked!==q.answer&&q.wrongExplanations&&q.wrongExplanations[picked]&&(
                  <div style={{marginTop:10,borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:10}}>
                    <div style={{fontSize:10,color:"#FF6F91",fontFamily:"monospace",letterSpacing:2,marginBottom:6}}>WHY YOUR ANSWER WAS WRONG</div>
                    <p style={{color:"#7a8db0",fontSize:13,lineHeight:1.7,margin:0}}>{q.wrongExplanations[picked]}</p>
                  </div>
                )}
              </div>

              {studyMode==="strikes"&&strikes>=5
                ?<button onClick={endSession} style={S.primaryBtn({background:"linear-gradient(135deg,#FF6F91,#cc4466)"})}>Game Over — See Results</button>
                :<button onClick={nextQ} style={S.primaryBtn({background:"linear-gradient(135deg,#845EC2,#6a44aa)",boxShadow:"0 4px 20px rgba(132,94,194,0.28)"})}>
                  {qIdx+1>=queue.length?"View Results →":"Next Question →"}
                </button>
              }
            </div>
          )}

          {/* Loading indicator for free response grading */}
          {gradingLoading&&(
            <div style={{marginTop:16,textAlign:"center"}}>
              <div style={{width:32,height:32,borderRadius:"50%",border:"3px solid rgba(255,111,145,0.15)",borderTopColor:"#FF6F91",animation:"spin 0.8s linear infinite",margin:"0 auto 8px"}}/>
              <div style={{fontSize:12,color:"#4a5a7a",fontFamily:"monospace"}}>AI grading your response…</div>
            </div>
          )}
        </div>
      </div>
      <style>{`@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  // ══════════════════════════════════════════════════════════════════════════
  // RESULTS
  // ══════════════════════════════════════════════════════════════════════════
  if(screen==="results") return (
    <div style={S.page}>
      <div style={S.wrap}>
        <div style={{textAlign:"center",padding:"40px 0 24px"}}>
          <div style={{fontSize:48,marginBottom:8}}>{pct>=80?"🏆":pct>=60?"📈":"📚"}</div>
          <span style={S.lbl}>Session Complete</span>
          <div style={{fontSize:"clamp(3rem,10vw,5rem)",fontWeight:700,lineHeight:1,
            background:pct>=80?"linear-gradient(135deg,#00C9A7,#00ffd5)":pct>=60?"linear-gradient(135deg,#FFC75F,#ffe0a0)":"linear-gradient(135deg,#FF6F91,#ffb0c0)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{pct}%</div>
          <div style={{color:"#4a5a7a",fontSize:14,marginTop:5}}>{score}/{Math.min(queue.length,qIdx+1)} correct</div>
          {bestStreak>=3&&<div style={{color:"#FFC75F",fontSize:12,marginTop:4,fontFamily:"monospace"}}>🔥 Best streak: {bestStreak}</div>}
          <div style={{display:"flex",justifyContent:"center",gap:14,marginTop:10}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:14,fontWeight:700,color:"#00C9A7",fontFamily:"monospace"}}>{mastered.length}</div><div style={{fontSize:10,color:"#4a5a7a"}}>Mastered</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:14,fontWeight:700,color:"#FF6F91",fontFamily:"monospace"}}>{learnBank.length}</div><div style={{fontSize:10,color:"#4a5a7a"}}>To Learn</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:14,fontWeight:700,color:"#FFC75F",fontFamily:"monospace"}}>{prog.highScore||pct}%</div><div style={{fontSize:10,color:"#4a5a7a"}}>Best Score</div></div>
          </div>
        </div>

        {Object.keys(sessionStats).length>0&&(
          <div style={{...S.card,marginBottom:14}}>
            <span style={S.lbl}>This Session</span>
            {Object.entries(sessionStats).map(([s,{correct,total}])=>(
              <div key={s} style={{marginBottom:11}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:"#6a7a9a"}}>{s}</span>
                  <span style={{fontSize:12,color:SC[s]||"#00C9A7",fontFamily:"monospace"}}>{correct}/{total}</span>
                </div>
                <PBar value={correct} max={total} color={SC[s]||"#00C9A7"}/>
              </div>
            ))}
          </div>
        )}

        {learnBank.length>0&&(
          <div style={{...S.card,marginBottom:14,borderColor:"rgba(255,111,145,0.2)"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#FF6F91",marginBottom:3}}>📖 {learnBank.length} in Learn folder</div>
            <div style={{fontSize:12,color:"#4a5a7a",marginBottom:10}}>Review these until you master them</div>
            <button onClick={()=>startStudy("learn")} style={S.primaryBtn({background:"linear-gradient(135deg,#FF6F91,#cc4466)",padding:"12px"})}>Review Missed Questions →</button>
          </div>
        )}

        <div style={{display:"flex",gap:10,marginBottom:14}}>
          <button onClick={()=>startStudy(studyMode,examType,customTopic,deepDiveTopic)} style={S.primaryBtn({flex:1})}>Try Again</button>
          <button onClick={()=>setScreen("dashboard")} style={{...S.ghostBtn,flex:1}}>Dashboard</button>
        </div>

        {!isPro&&(
          <div style={{...S.card,borderColor:"rgba(0,201,167,0.15)",background:"rgba(0,201,167,0.04)",textAlign:"center",padding:18}}>
            <div style={{fontSize:13,color:"#00C9A7",marginBottom:3,fontWeight:700}}>💡 Unlock everything</div>
            <div style={{fontSize:12,color:"#4a5a7a",marginBottom:12}}>PA Prep Pro · $14.99/mo or $99/yr</div>
            <button onClick={()=>setScreen("paywall")} style={{padding:"10px 22px",borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#00C9A7,#009d84)",color:"#fff",fontSize:13,fontWeight:700}}>Upgrade to Pro →</button>
          </div>
        )}
      </div>
      <style>{`*{box-sizing:border-box}`}</style>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
