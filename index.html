async function generateAIQuestions(subject, difficulty, count, used=[]) {
  const subjectCtx = subject==="All"
    ? "any PA school subject (Anatomy & Physiology, Pharmacology, Clinical Medicine, Pathophysiology, or Medical Ethics & Law)"
    : subject;
  const recent = used.slice(-6).map(q=>q.question).join("; ");
  const prompt = `You are an expert PA school educator. Generate ${count} unique multiple-choice questions for PA board exam prep.
Subject: ${subjectCtx}
Difficulty: ${difficulty&&difficulty!=="All"?difficulty:"mix of Easy, Medium, Hard"}
Do NOT repeat: ${recent}
Return ONLY valid JSON array, no markdown:
[{"subject":"exact subject","difficulty":"Easy|Medium|Hard","question":"text","options":["A","B","C","D"],"answer":0,"explanation":"2-3 sentence explanation"}]
answer = 0-based index. Board-style clinical questions. Valid JSON only.`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==="text")?.text||"[]";
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    return parsed.map((q,i)=>({...q,id:Date.now()+i,ai:true}));
  } catch(e) { return []; }
}

function App() {
  const [screen,setScreen]   = React.useState("landing");
  const [authMode,setAuthMode] = React.useState("signup");
  const [form,setForm]       = React.useState({name:"",email:"",password:""});
  const [formErr,setFormErr] = React.useState("");
  const [user,setUser]       = React.useState(()=>store.get("paprep_user"));
  const [prog,setProg]       = React.useState(()=>store.get("paprep_prog")||{totalAnswered:0,totalCorrect:0,sessions:0,subjectStats:{}});
  const [bank,setBank]       = React.useState([...QUESTIONS]);
  const [queue,setQueue]     = React.useState([]);
  const [qIdx,setQIdx]       = React.useState(0);
  const [picked,setPicked]   = React.useState(null);
  const [score,setScore]     = React.useState(0);
  const [answers,setAnswers] = React.useState([]);
  const [streak,setStreak]   = React.useState(0);
  const [bestStreak,setBest] = React.useState(0);
  const [stats,setStats]     = React.useState({});
  const [subj,setSubj]       = React.useState("All");
  const [diff,setDiff]       = React.useState("All");
  const [animIn,setAnimIn]   = React.useState(true);
  const [loading,setLoading] = React.useState(false);
  const [loadMsg,setLoadMsg] = React.useState("");
  const [bgFill,setBgFill]   = React.useState(false);

  const q = queue[qIdx];
  const isPro = user?.pro||false;
  const hitLimit = !isPro && prog.totalAnswered >= CONFIG.FREE_LIMIT;
  const overallPct = prog.totalAnswered ? Math.round((prog.totalCorrect/prog.totalAnswered)*100) : 0;

  React.useEffect(()=>{store.set("paprep_prog",prog);},[prog]);
  React.useEffect(()=>{if(user)store.set("paprep_user",user);},[user]);

  // background AI fill
  React.useEffect(()=>{
    if(bank.length<120&&!bgFill){
      setBgFill(true);
      Promise.all(SUBJECTS.slice(1).flatMap(s=>DIFFS.map(d=>generateAIQuestions(s,d,5,bank))))
        .then(r=>{const nq=r.flat().map((q,i)=>({...q,id:Date.now()+i}));setBank(b=>[...b,...nq]);})
        .finally(()=>setBgFill(false));
    }
  },[bank.length,bgFill]);

  const handleAuth = ()=>{
    if(!form.email||!form.password){setFormErr("Please fill in all fields.");return;}
    if(authMode==="signup"&&!form.name){setFormErr("Please enter your name.");return;}
    const u={name:form.name||form.email.split("@")[0],email:form.email,pro:false};
    setUser(u); setFormErr(""); setScreen("dashboard");
  };

  const logout = ()=>{store.set("paprep_user",null);setUser(null);setScreen("landing");};

  const activatePro = ()=>{
    const u={...user,pro:true};
    setUser(u); store.set("paprep_user",u);
  };

  const startQuiz = async ()=>{
    if(hitLimit){setScreen("paywall");return;}
    setLoading(true); setLoadMsg("Loading questions…");
    try{
      let pool = bank.filter(q=>(subj==="All"||q.subject===subj)&&(diff==="All"||q.difficulty===diff)).sort(()=>Math.random()-0.5).slice(0,10);
      if(pool.length<10){
        setLoadMsg("Generating with AI…");
        const ai = await generateAIQuestions(subj,diff,10-pool.length+4,bank);
        const nq = ai.map((q,i)=>({...q,id:Date.now()+i}));
        setBank(b=>[...b,...nq]);
        pool=[...pool,...nq].slice(0,10);
      }
      setQueue(pool);setQIdx(0);setPicked(null);setScore(0);setAnswers([]);setStreak(0);setBest(0);
      setAnimIn(false);
      setTimeout(()=>{setAnimIn(true);setScreen("quiz");},80);
    }catch(e){setLoadMsg("Error — try again.");setTimeout(()=>setScreen("dashboard"),2000);}
    finally{setLoading(false);setLoadMsg("");}
  };

  const handlePick = (idx)=>{
    if(picked!==null||!q)return;
    setPicked(idx);
    const ok=idx===q.answer;
    const ns=ok?streak+1:0;
    setStreak(ns);if(ns>bestStreak)setBest(ns);
    if(ok)setScore(s=>s+1);
    setAnswers(a=>[...a,{ok,subject:q.subject}]);

                  <span style={{fontSize:12,color:"#6a7a9a"}}>{s}</span>
                  <span style={{fontSize:12,color:SC[s],fontFamily:"monospace"}}>{correct}/{total}</span>
                </div>
                <PBar value={correct} max={total} color={SC[s]}/>
              </div>
            ))}
          </div>
        )}

        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <button onClick={startQuiz} style={{...S.primaryBtn,flex:1}}>Try Again</button>
          <button onClick={()=>setScreen("dashboard")} style={{...S.ghostBtn,flex:1}}>Dashboard</button>
        </div>

        {!isPro&&(
          <div style={{...S.card,borderColor:"rgba(0,201,167,0.15)",background:"rgba(0,201,167,0.04)",textAlign:"center",padding:24}}>
            <div style={{fontSize:14,color:"#00C9A7",marginBottom:4,fontWeight:700}}>💡 Unlock unlimited questions</div>
            <div style={{fontSize:12,color:"#4a5a7a",lineHeight:1.7,marginBottom:14}}>PA Prep Pro · $14.99/mo or $99/yr</div>
            <button onClick={()=>setScreen("paywall")} style={{padding:"12px 28px",borderRadius:10,border:"none",cursor:"pointer",background:"linear-gradient(135deg,#00C9A7,#009d84)",color:"#fff",fontSize:13,fontWeight:700}}>
              Upgrade to Pro →
            </button>
          </div>
        )}
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
